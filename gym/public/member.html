  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">IronPulse</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="#trainers">Trainers</a></li>
<li><a href="#pricing">Membership</a></li>

<div class="dashboard">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <p id="welcomeText">Welcome</p>
      </div>

      <ul class="sidebar-menu">
        <li class="menu-item active-menu" onclick="showSection('billReceipts', this)">
          View Bill Receipts
        </li>
        <li class="menu-item" onclick="showSection('billNotifications', this)">
          View Notifications
        </li>
        <li class="menu-item logout-btn" onclick="logoutMember()">
          Logout
        </li>
      </ul>
    </aside>

    <!-- Right Content -->
    <main class="main-content">
      <section id="billReceipts" class="content active">
        <div class="section-header">
          <h1>Bill Receipts</h1>
          <p>Your gym bills are shown here.</p>
        </div>
        <div id="billReceiptList" class="cards-container"></div>
      </section>

      <section id="billNotifications" class="content">
        <div class="section-header">
          <h1>Notifications</h1>
          <p>Your admin notifications are shown here.</p>
        </div>
        <div id="billNotificationList" class="cards-container"></div>
      </section>
    </main>
  </div>



  <script src="../public/script/member.js"></script>
